<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Exchange Club</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px 40px;
      color: #202124;
      background: #fafafa;
    }
    h1, h2 { margin: 0 0 12px; }
    h1 { font-size: 28px; }
    h2 { font-size: 20px; }
    section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
    }
    form, .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      align-items: end;
    }
    input, select, button, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 9px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font: inherit;
    }
    textarea { min-height: 40px; resize: vertical; }
    button {
      border: 0;
      background: #0b57d0;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary { background: #5f6368; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      border-top: 1px solid #eee;
      padding: 12px 0;
    }
    li:first-child { border-top: 0; }
    .muted { color: #666; font-size: 14px; }
    .pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: #e8f0fe;
      color: #174ea6;
      font-size: 12px;
      margin-left: 4px;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .actions button {
      width: auto;
      min-width: 120px;
    }
    .error {
      color: #b3261e;
      min-height: 20px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Book Exchange Club</h1>
  <p class="muted">Register members, list books, request exchanges or loans, confirm both sides, and update points.</p>

  <section>
    <h2>Members</h2>
    <form id="member-form">
      <input id="member-name" placeholder="Member name" required />
      <input id="member-contact" placeholder="Contact info" required />
      <button type="submit">Register member</button>
      <button type="button" class="secondary" id="seed-button">Seed demo data</button>
    </form>
    <p class="error" id="member-error"></p>
    <ul id="member-list"></ul>
  </section>

  <section>
    <h2>Add Book</h2>
    <form id="book-form">
      <select id="book-owner" required></select>
      <input id="book-title" placeholder="Book title" required />
      <input id="book-genre" placeholder="Genre" required />
      <input id="book-author" placeholder="Author" required />
      <input id="book-year" type="number" placeholder="Publication year" required />
      <input id="book-condition" placeholder="Condition" required />
      <select id="book-mode" required>
        <option value="permanent">Permanent exchange (+/-10)</option>
        <option value="loan">Loan with return (+/-5)</option>
      </select>
      <button type="submit">Add book</button>
    </form>
    <p class="error" id="book-error"></p>
  </section>

  <section>
    <h2>Book Catalog</h2>
    <ul id="book-list"></ul>
  </section>

  <section>
    <h2>Transactions</h2>
    <ul id="transaction-list"></ul>
  </section>

  <script>
    const state = { members: [], books: [], transactions: [] };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      if (!response.ok) {
        const error = await response.json().catch(() => ({ detail: "Request failed" }));
        throw new Error(error.detail || "Request failed");
      }
      return response.json();
    }

    function memberOptions(selectedId = "") {
      return state.members
        .map(member => `<option value="${member.id}" ${String(member.id) === String(selectedId) ? "selected" : ""}>${escapeHtml(member.name)}</option>`)
        .join("");
    }

    function courierOptions() {
      const couriers = state.members.filter(member => member.is_courier);
      if (!couriers.length) return '<option value="">No couriers yet</option>';
      return '<option value="">Choose courier</option>' + couriers
        .map(member => `<option value="${member.id}">${escapeHtml(member.name)}</option>`)
        .join("");
    }

    function renderMembers() {
      document.getElementById("book-owner").innerHTML = memberOptions();
      document.getElementById("member-list").innerHTML = state.members.map(member => `
        <li>
          <strong>${escapeHtml(member.name)}</strong>
          <span class="pill">${member.points} points</span>
          ${member.is_courier ? '<span class="pill">courier</span>' : ""}
          <div class="muted">${escapeHtml(member.contact)}</div>
          ${member.is_courier ? "" : `<div class="actions"><button type="button" onclick="makeCourier(${member.id})">Volunteer as courier</button></div>`}
        </li>
      `).join("") || '<li class="muted">No members yet.</li>';
    }

    function renderBooks() {
      const requesterSelect = memberOptions();
      const courierSelect = courierOptions();
      document.getElementById("book-list").innerHTML = state.books.map(book => `
        <li>
          <strong>${escapeHtml(book.title)}</strong>
          <span class="pill">${book.exchange_mode}</span>
          <span class="pill">${book.available ? "available" : "reserved"}</span>
          <div class="muted">
            ${escapeHtml(book.author)} (${book.publication_year}) · ${escapeHtml(book.genre)} · ${escapeHtml(book.condition)}
          </div>
          <div class="muted">Owner: ${escapeHtml(book.owner_name)} · ${escapeHtml(book.owner_contact)}</div>
          ${book.available ? `
            <div class="row">
              <select id="requester-${book.id}">${requesterSelect}</select>
              <select id="delivery-${book.id}">
                <option value="direct">Direct contact</option>
                <option value="courier">Use free courier</option>
              </select>
              <select id="courier-${book.id}">${courierSelect}</select>
              <input id="note-${book.id}" placeholder="Optional note" />
              <button type="button" onclick="requestBook(${book.id})">Request</button>
            </div>
          ` : ""}
        </li>
      `).join("") || '<li class="muted">No books yet.</li>';
    }

    function renderTransactions() {
      document.getElementById("transaction-list").innerHTML = state.transactions.map(transaction => `
        <li>
          <strong>${escapeHtml(transaction.book_title)}</strong>
          <span class="pill">${transaction.status}</span>
          <span class="pill">${transaction.exchange_mode}</span>
          <div class="muted">
            Owner ${escapeHtml(transaction.owner_name)} (${transaction.owner_points_delta >= 0 ? "+" : ""}${transaction.owner_points_delta})
            · Requester ${escapeHtml(transaction.requester_name)} (${transaction.requester_points_delta})
            ${transaction.courier_name ? `· Courier ${escapeHtml(transaction.courier_name)} (+${transaction.courier_points_delta})` : ""}
          </div>
          <div class="muted">
            Owner confirmed: ${transaction.owner_confirmed ? "yes" : "no"} · Requester confirmed: ${transaction.requester_confirmed ? "yes" : "no"}
            ${transaction.note ? `· Note: ${escapeHtml(transaction.note)}` : ""}
          </div>
          <div class="actions">
            <button type="button" onclick="confirmTxn(${transaction.id}, ${transaction.owner_id})" ${transaction.owner_confirmed ? "disabled" : ""}>Owner confirms</button>
            <button type="button" onclick="confirmTxn(${transaction.id}, ${transaction.requester_id})" ${transaction.requester_confirmed ? "disabled" : ""}>Requester confirms</button>
          </div>
        </li>
      `).join("") || '<li class="muted">No transactions yet.</li>';
    }

    async function loadAll() {
      [state.members, state.books, state.transactions] = await Promise.all([
        api("/api/members"),
        api("/api/books"),
        api("/api/transactions")
      ]);
      renderMembers();
      renderBooks();
      renderTransactions();
    }

    async function makeCourier(memberId) {
      await api(`/api/members/${memberId}/courier`, { method: "POST" });
      await loadAll();
    }

    async function requestBook(bookId) {
      const requesterId = Number(document.getElementById(`requester-${bookId}`).value);
      const deliveryMode = document.getElementById(`delivery-${bookId}`).value;
      const courierId = Number(document.getElementById(`courier-${bookId}`).value) || null;
      const note = document.getElementById(`note-${bookId}`).value;
      await api("/api/transactions", {
        method: "POST",
        body: JSON.stringify({
          book_id: bookId,
          requester_id: requesterId,
          delivery_mode: deliveryMode,
          courier_id: deliveryMode === "courier" ? courierId : null,
          note
        })
      });
      await loadAll();
    }

    async function confirmTxn(transactionId, memberId) {
      await api(`/api/transactions/${transactionId}/confirm`, {
        method: "POST",
        body: JSON.stringify({ member_id: memberId })
      });
      await loadAll();
    }

    document.getElementById("member-form").addEventListener("submit", async event => {
      event.preventDefault();
      document.getElementById("member-error").textContent = "";
      try {
        await api("/api/members", {
          method: "POST",
          body: JSON.stringify({
            name: document.getElementById("member-name").value,
            contact: document.getElementById("member-contact").value
          })
        });
        event.target.reset();
        await loadAll();
      } catch (error) {
        document.getElementById("member-error").textContent = error.message;
      }
    });

    document.getElementById("book-form").addEventListener("submit", async event => {
      event.preventDefault();
      document.getElementById("book-error").textContent = "";
      try {
        await api("/api/books", {
          method: "POST",
          body: JSON.stringify({
            owner_id: Number(document.getElementById("book-owner").value),
            title: document.getElementById("book-title").value,
            genre: document.getElementById("book-genre").value,
            author: document.getElementById("book-author").value,
            publication_year: Number(document.getElementById("book-year").value),
            condition: document.getElementById("book-condition").value,
            exchange_mode: document.getElementById("book-mode").value
          })
        });
        event.target.reset();
        await loadAll();
      } catch (error) {
        document.getElementById("book-error").textContent = error.message;
      }
    });

    document.getElementById("seed-button").addEventListener("click", async () => {
      document.getElementById("member-error").textContent = "";
      try {
        await api("/api/demo-seed", { method: "POST" });
        await loadAll();
      } catch (error) {
        document.getElementById("member-error").textContent = error.message;
      }
    });

    loadAll().catch(error => {
      document.getElementById("member-error").textContent = error.message;
    });
  </script>
</body>
</html>
